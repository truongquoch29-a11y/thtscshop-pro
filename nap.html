<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nạp tiền</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(270deg,#020617,#0f172a,#020617);
background-size:600% 600%;
animation:bgmove 12s ease infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
text-align:center;
padding:25px 0;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 0 15px rgba(255,255,255,0.4);
}

.title{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

.note-box{
margin:0 auto 20px auto;
width:320px;
background:rgba(15,23,42,0.6);
border:1px solid #1e293b;
border-radius:10px;
padding:15px;
font-size:14px;
line-height:1.6;
}

.note{
display:flex;
align-items:flex-start;
gap:8px;
margin-bottom:8px;
}

.note-icon{
font-size:16px;
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.box{
background:rgba(0,0,0,0.45);
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
animation:fade 0.5s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.nap-btn{
background:#22c55e;
color:white;
}

.wait-btn{
background:#f59e0b;
color:white;
}

.back-btn{
background:#3b82f6;
color:white;
}

.loading{
margin-top:15px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid white;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

footer{
width:100%;
background:#0b1220;
text-align:center;
padding:20px;
margin-top:80px;
margin-bottom:40px;
}

.footer-text{
font-size:14px;
margin-bottom:10px;
opacity:.9;
}

.footer-links{
display:flex;
justify-content:center;
gap:12px;
flex-wrap:wrap;
}

.footer-btn{
background:rgba(255,255,255,0.12);
border:1px solid rgba(255,255,255,0.25);
padding:8px 16px;
border-radius:12px;
color:white;
text-decoration:none;
font-size:13px;
transition:.25s;
}

.footer-btn:hover{
transform:scale(1.08);
}

#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#020617;
padding:12px 20px;
border-radius:8px;
border:1px solid #1e293b;
opacity:0;
transition:0.3s;
}

</style>
</head>

<body>

<header>
<img src="images/logo-1.png" class="logo">
<div class="title">Nạp tiền vào tài khoản</div>
</header>

<div class="note-box">

<div class="note">
<span class="note-icon">📸</span>
<span>Lưu ý: chuyển khoản xong hãy <b>chụp bill giao dịch</b> để upload xác minh.</span>
</div>

<div class="note">
<span class="note-icon">💬</span>
<span>Nếu bạn không có tài khoản ngân hàng, hãy liên hệ admin để nạp tiền 👉 
<a href="#" style="color:#22c55e;text-decoration:none;font-weight:bold">Ấn vào đây</a>
</span>
</div>

</div>

<main>

<div class="box" id="box">

<h3>Nhập số tiền cần nạp</h3>

<input id="amount" type="text" placeholder="Ví dụ: 10.000" oninput="formatMoney(this)">

<button class="nap-btn" onclick="nap()">Nạp ngay</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

</div>

</main>

<footer>

<div class="footer-text">
Cảm ơn quý khách đã ghé thăm shop
</div>

<div class="footer-links">
<a href="#" class="footer-btn">Zalo</a>
<a href="#" class="footer-btn">Facebook</a>
<a href="#" class="footer-btn">Group Zalo</a>
</div>

</footer>

<div id="popup"></div>

<script>

const SERVER="https://shop-server-66d5.onrender.com"

let depositID=null
let depositAmount=0
let waiting=false

function popup(text,color){

let p=document.getElementById("popup")

p.innerText=text
p.style.borderColor=color
p.style.opacity="1"

setTimeout(()=>{
p.style.opacity="0"
},2500)

}

function goHome(){
window.location.href="shop-main.html"
}

function formatMoney(input){

let value=input.value.replace(/\D/g,"")

if(!value){
input.value=""
return
}

input.value=Number(value).toLocaleString("vi-VN")

}

/* KHÔI PHỤC QR SAU KHI RELOAD */

function restoreDeposit(){

let id=localStorage.getItem("deposit_id")
let amount=localStorage.getItem("deposit_amount")
let content=localStorage.getItem("deposit_content")

if(!id || !amount || !content) return

depositID=id
depositAmount=parseInt(amount)

let bank="VCB"
let account="9702093263"
let name="TRUONG QUOC HUY"

let qr=`https://img.vietqr.io/image/${bank}-${account}-compact.png?amount=${amount}&addInfo=${content}&accountName=${name}`

document.getElementById("box").innerHTML=`

<h3>Quét QR để chuyển khoản</h3>

<img src="${qr}" style="width:220px;margin-top:15px;border-radius:10px">

<p style="margin-top:15px">Nội dung:</p>

<b>${content}</b>

<p style="margin-top:10px">${Number(amount).toLocaleString("vi-VN")} VND</p>

<button class="wait-btn" onclick="daNap()">Tôi đã nạp</button>

<input type="file" id="bankImage" accept="image/*" onchange="previewImage()" style="margin-top:15px">

<img id="preview" style="display:none;width:140px;margin-top:10px;border-radius:6px;border:1px solid #1e293b">

<button class="nap-btn" onclick="uploadImage()">Upload ảnh giao dịch</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

`

}

async function nap(){

let raw=document.getElementById("amount").value.replace(/\./g,"")
let amount=parseInt(raw)

if(!amount || amount<2000){
popup("Nạp tối thiểu 2.000đ","#ef4444")
return
}

let username=localStorage.getItem("login")

if(!username){
window.location.href="login.html"
return
}

try{

let res=await fetch(SERVER+"/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

let data=await res.json()

if(data.status!=="success"){
popup("Không tạo được giao dịch","#ef4444")
return
}

depositID=data.id
depositAmount=amount

/* LƯU QR VÀO LOCALSTORAGE */

localStorage.setItem("deposit_id",depositID)
localStorage.setItem("deposit_amount",amount)
localStorage.setItem("deposit_content",data.content)

let bank="VCB"
let account="9702093263"
let name="TRUONG QUOC HUY"

let qr=`https://img.vietqr.io/image/${bank}-${account}-compact.png?amount=${amount}&addInfo=${data.content}&accountName=${name}`

document.getElementById("box").innerHTML=`

<h3>Quét QR để chuyển khoản</h3>

<img src="${qr}" style="width:220px;margin-top:15px;border-radius:10px">

<p style="margin-top:15px">Nội dung:</p>

<b>${data.content}</b>

<p style="margin-top:10px">${Number(amount).toLocaleString("vi-VN")} VND</p>

<button class="wait-btn" onclick="daNap()">Tôi đã nạp</button>

<input type="file" id="bankImage" accept="image/*" onchange="previewImage()" style="margin-top:15px">

<img id="preview" style="display:none;width:140px;margin-top:10px;border-radius:6px;border:1px solid #1e293b">

<button class="nap-btn" onclick="uploadImage()">Upload ảnh giao dịch</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

`

}catch{
popup("Không kết nối được server","#ef4444")
}

}

function previewImage(){

let file=document.getElementById("bankImage").files[0]

if(!file) return

let reader=new FileReader()

reader.onload=function(e){

let img=document.getElementById("preview")

img.src=e.target.result
img.style.display="block"

}

reader.readAsDataURL(file)

}

function daNap(){

waiting=true

document.getElementById("box").innerHTML=`

<h3>Đang chờ admin xác nhận</h3>

<div class="loading"></div>

<p style="margin-top:15px">Giao dịch đang được kiểm tra</p>

`

setInterval(checkDeposit,4000)

}

async function checkDeposit(){

if(!waiting) return

try{

let res=await fetch(SERVER+"/deposit-status/"+depositID+"?t="+Date.now())
let data=await res.json()

if(data.status==="success"){

waiting=false

/* XÓA QR SAU KHI HOÀN TẤT */

localStorage.removeItem("deposit_id")
localStorage.removeItem("deposit_amount")
localStorage.removeItem("deposit_content")

popup("Đã cộng "+depositAmount.toLocaleString("vi-VN")+"đ vào số dư","#22c55e")

setTimeout(()=>{
window.location.href="shop-main.html"
},1500)

}

if(data.status==="deleted"){

waiting=false

localStorage.removeItem("deposit_id")
localStorage.removeItem("deposit_amount")
localStorage.removeItem("deposit_content")

popup("Không chấp nhận giao dịch, hãy thử lại","#ef4444")

setTimeout(()=>{
window.location.reload()
},2000)

}

}catch{}

}

setInterval(checkUser,5000)

async function checkUser(){

let username=localStorage.getItem("login")

if(!username) return

try{

let res=await fetch(SERVER+"/user/"+username)
let data=await res.json()

if(data.status==="deleted"){
logout()
return
}

if(data.kicked===true){
logout()
return
}

}catch{}

}

function logout(){

localStorage.removeItem("login")

popup("Tài khoản đã bị đăng xuất","#ef4444")

setTimeout(()=>{
window.location.href="login.html"
},1500)

}

async function uploadImage(){

let file=document.getElementById("bankImage").files[0]

if(!file){
popup("Chọn ảnh giao dịch","#ef4444")
return
}

let form=new FormData()
form.append("image",file)

try{

let res=await fetch(SERVER+"/upload-deposit",{
method:"POST",
body:form
})

let data=await res.json()

if(data.status==="success"){

popup("Đã xác nhận giao dịch","#22c55e")

setTimeout(()=>{
window.location.href="shop-main.html"
},1500)

return
}

if(data.status==="timeout"){
popup("Giao dịch quá thời gian","#ef4444")
return
}

popup("Không nhận diện được giao dịch","#ef4444")

}catch{
popup("Lỗi upload","#ef4444")
}

}

/* TỰ KHÔI PHỤC QR */

restoreDeposit()

</script>

</body>
</html>
