<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<title>Nạp tiền</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(270deg,#0f172a,#1e293b,#0f172a);
background-size:600% 600%;
animation:bgmove 12s ease infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* HEADER */

header{
text-align:center;
padding:25px 0;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 0 15px rgba(255,255,255,0.4);
}

.title{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

/* MAIN */

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.box{
background:rgba(30,41,59,0.9);
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
animation:fade 0.6s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px)}
to{opacity:1; transform:translateY(0)}
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
margin-top:20px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.25s;
}

/* BUTTONS */

.nap-btn{
background:#22c55e;
color:white;
}

.nap-btn:hover{
transform:scale(1.05);
box-shadow:0 0 10px #22c55e;
}

.back-btn{
background:#3b82f6;
color:white;
animation:pulse 1.5s infinite;
}

.wait-btn{
background:#f59e0b;
color:white;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.07)}
100%{transform:scale(1)}
}

/* FOOTER */

footer{
text-align:center;
padding:15px;
background:#020617;
font-size:14px;
}

/* POPUP */

#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#020617;
padding:12px 20px;
border-radius:8px;
border:1px solid #1e293b;
opacity:0;
transition:0.3s;
z-index:1000;
}

</style>

</head>

<body>

<header>

<img src="images/logo-1.png" class="logo">

<div class="title">Nạp tiền vào tài khoản</div>

</header>

<main>

<div class="box">

<h3>Nhập số tiền cần nạp</h3>

<input id="amount" type="number" placeholder="Ví dụ: 50000">

<button class="nap-btn" onclick="nap()">Nạp ngay</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

</div>

</main>

<footer>
© THTSCSHOP
</footer>

<div id="popup"></div>

<script>

const SERVER="https://shop-server-66d5.onrender.com"

let currentDeposit=null
let waiting=false

function popup(text,color){

let p=document.getElementById("popup")

p.innerText=text
p.style.borderColor=color
p.style.opacity="1"

setTimeout(()=>{
p.style.opacity="0"
},2500)

}

function goHome(){
window.location.href="shop-main.html"
}

async function nap(){

let amount=document.getElementById("amount").value

if(!amount || amount<1000){
popup("Số tiền không hợp lệ","#ef4444")
return
}

let username=localStorage.getItem("login")

if(!username){
window.location.href="login.html"
return
}

try{

let res=await fetch(SERVER+"/deposit",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
username:username,
amount:amount
})
})

let data=await res.json()

if(data.status!=="success"){
popup("Không tạo được giao dịch","#ef4444")
return
}

let content=data.content
currentDeposit=data.id

let bank="VCB"
let account="9702093263"
let name="TRUONG QUOC HUY"

let qr=`https://img.vietqr.io/image/${bank}-${account}-compact.png?amount=${amount}&addInfo=${content}&accountName=${name}`

document.querySelector(".box").innerHTML=`

<h3>Quét QR để chuyển khoản</h3>

<img src="${qr}" style="width:220px;margin-top:15px;border-radius:10px">

<p style="margin-top:15px">Nội dung:</p>
<b>${content}</b>

<p style="margin-top:10px">${amount} VND</p>

<button class="wait-btn" onclick="daNap()">Tôi đã nạp</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

`

}catch{

popup("Không kết nối được server","#ef4444")

}

}

function daNap(){

waiting=true

popup("Đang chờ admin xác nhận","#f59e0b")

setInterval(checkDeposit,5000)

}

async function checkDeposit(){

if(!waiting || !currentDeposit) return

try{

let res=await fetch(SERVER+"/deposit-status/"+currentDeposit)
let data=await res.json()

if(data.status==="approved"){

popup("Nạp tiền thành công","#22c55e")

setTimeout(()=>{
window.location.href="shop-main.html"
},2000)

}

if(data.status==="deleted"){

popup("Giao dịch đã bị hủy","#ef4444")

setTimeout(()=>{
window.location.reload()
},2000)

}

}catch{}

}

/* CHECK USER */

setInterval(checkUser,5000)

async function checkUser(){

let username=localStorage.getItem("login")

if(!username) return

try{

let res=await fetch(SERVER+"/user/"+username)
let data=await res.json()

if(data.status==="deleted"){
logout()
return
}

if(data.kicked===true){
logout()
return
}

}catch{}

}

function logout(){

localStorage.removeItem("login")

popup("Tài khoản đã bị đăng xuất","#ef4444")

setTimeout(()=>{
window.location.href="login.html"
},1500)

}

</script>

</body>
</html>
