<!DOCTYPE html>
<html lang="vi">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nạp tiền</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
background:linear-gradient(270deg,#020617,#0f172a,#020617);
background-size:600% 600%;
animation:bgmove 12s ease infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

header{
text-align:center;
padding:25px 0;
}

.logo{
width:90px;
height:90px;
border-radius:50%;
object-fit:cover;
border:3px solid white;
box-shadow:0 0 15px rgba(255,255,255,0.4);
}

.title{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

.note-box{
margin:0 auto 20px auto;
width:320px;
background:rgba(15,23,42,0.6);
border:1px solid #1e293b;
border-radius:10px;
padding:15px;
font-size:14px;
line-height:1.6;
}

.note{
display:flex;
align-items:flex-start;
gap:8px;
margin-bottom:8px;
}

main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

.box{
background:rgba(0,0,0,0.45);
padding:35px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

input{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:8px;
font-size:16px;
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.nap-btn{background:#22c55e;color:white;}
.wait-btn{background:#f59e0b;color:white;}
.back-btn{background:#3b82f6;color:white;}

.loading{
margin-top:15px;
border:4px solid rgba(255,255,255,0.1);
border-top:4px solid white;
border-radius:50%;
width:35px;
height:35px;
animation:spin 1s linear infinite;
margin-left:auto;
margin-right:auto;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

#popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#020617;
padding:12px 20px;
border-radius:8px;
border:1px solid #1e293b;
opacity:0;
transition:0.3s;
}

</style>
</head>

<body>

<header>
<img src="images/logo-1.png" class="logo">
<div class="title">Nạp tiền vào tài khoản</div>
</header>

<main>

<div class="box" id="box">

<h3>Nhập số tiền cần nạp</h3>

<input id="amount" type="text" placeholder="Ví dụ: 10.000" oninput="formatMoney(this)">

<button class="nap-btn" onclick="nap()">Nạp ngay</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

</div>

</main>

<div id="popup"></div>

<script>

const SERVER="https://shop-server-66d5.onrender.com"

let depositID=null
let depositAmount=0
let waiting=false
let checkTimer=null

function popup(text,color){

let p=document.getElementById("popup")

p.innerText=text
p.style.borderColor=color
p.style.opacity="1"

setTimeout(()=>{
p.style.opacity="0"
},2500)

}

function goHome(){
window.location.href="shop-main.html"
}

function formatMoney(input){

let value=input.value.replace(/\D/g,"")

if(!value){
input.value=""
return
}

input.value=Number(value).toLocaleString("vi-VN")

}

function restoreDeposit(){

let id=localStorage.getItem("deposit_id")
let amount=localStorage.getItem("deposit_amount")
let content=localStorage.getItem("deposit_content")

if(!id || !amount || !content) return

depositID=id
depositAmount=parseInt(amount)

showQR(amount,content)

}

function showQR(amount,content){

let bank="VCB"
let account="9702093263"
let name="TRUONG QUOC HUY"

let qr=`https://img.vietqr.io/image/${bank}-${account}-compact.png?amount=${amount}&addInfo=${content}&accountName=${name}`

document.getElementById("box").innerHTML=`

<h3>Quét QR để chuyển khoản</h3>

<img src="${qr}" style="width:220px;margin-top:15px;border-radius:10px">

<p style="margin-top:15px">Nội dung:</p>

<b>${content}</b>

<p style="margin-top:10px">${Number(amount).toLocaleString("vi-VN")} VND</p>

<button class="wait-btn" onclick="daNap()">Tôi đã nạp</button>

<input type="file" id="bankImage" accept="image/*" onchange="previewImage()" style="margin-top:15px">

<img id="preview" style="display:none;width:140px;margin-top:10px;border-radius:6px;border:1px solid #1e293b">

<button class="nap-btn" onclick="uploadImage()">Upload ảnh giao dịch</button>

<button class="back-btn" onclick="goHome()">← Quay lại trang chủ</button>

`

}

async function nap(){

let raw=document.getElementById("amount").value.replace(/\./g,"")
let amount=parseInt(raw)

if(!amount || amount<2000){
popup("Nạp tối thiểu 2.000đ","#ef4444")
return
}

let username=localStorage.getItem("login")

if(!username){
window.location.href="login.html"
return
}

try{

let res=await fetch(SERVER+"/deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

let data=await res.json()

depositID=data.id
depositAmount=amount

localStorage.setItem("deposit_id",depositID)
localStorage.setItem("deposit_amount",amount)
localStorage.setItem("deposit_content",data.content)

showQR(amount,data.content)

}catch{
popup("Không kết nối server","#ef4444")
}

}

function previewImage(){

let file=document.getElementById("bankImage").files[0]
if(!file) return

let reader=new FileReader()

reader.onload=function(e){
let img=document.getElementById("preview")
img.src=e.target.result
img.style.display="block"
}

reader.readAsDataURL(file)

}

function daNap(){

waiting=true

document.getElementById("box").innerHTML=`

<h3>Đang kiểm tra giao dịch</h3>

<div class="loading"></div>

<p style="margin-top:15px">Bot đang xác minh</p>

`

checkTimer=setInterval(checkDeposit,4000)

}

async function checkDeposit(){

if(!waiting) return

try{

let res=await fetch(SERVER+"/deposit-status/"+depositID+"?t="+Date.now())
let data=await res.json()

if(data.status==="success"){

waiting=false
clearInterval(checkTimer)

localStorage.removeItem("deposit_id")
localStorage.removeItem("deposit_amount")
localStorage.removeItem("deposit_content")

popup("Nạp tiền thành công","#22c55e")

setTimeout(()=>{
window.location.href="shop-main.html"
},1200)

}

}catch{}

}

async function uploadImage(){

let file=document.getElementById("bankImage").files[0]

if(!file){
popup("Chọn ảnh giao dịch","#ef4444")
return
}

let form=new FormData()
form.append("image",file)
form.append("depositID",depositID)

try{

let res=await fetch(SERVER+"/upload-deposit",{
method:"POST",
body:form
})

let data=await res.json()

if(data.status==="success"){

localStorage.removeItem("deposit_id")
localStorage.removeItem("deposit_amount")
localStorage.removeItem("deposit_content")

popup("Đã xác minh giao dịch","#22c55e")

setTimeout(()=>{
window.location.href="shop-main.html"
},1200)

return
}

popup("Không nhận diện được giao dịch","#ef4444")

}catch{
popup("Lỗi upload","#ef4444")
}

}

restoreDeposit()

</script>

</body>
</html>
