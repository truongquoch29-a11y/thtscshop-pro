<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>THTSCSHOP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgmove 14s infinite;
color:white;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* card */

.container{
text-align:center;
background:rgba(255,255,255,0.1);
padding:50px;
border-radius:20px;
backdrop-filter:blur(12px);
box-shadow:0 20px 40px rgba(0,0,0,0.5);
animation:fade 1s;
}

@keyframes fade{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

/* logo auto crop circle */

.logo{
width:130px;
height:130px;
border-radius:50%;
object-fit:cover;
overflow:hidden;
box-shadow:0 0 25px rgba(255,255,255,0.6);
margin-bottom:20px;
animation:float 3s infinite ease-in-out;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

h1{
font-size:36px;
margin-bottom:10px;
}

.desc{
opacity:0.8;
margin-bottom:25px;
}

.btn{
display:inline-block;
margin:10px;
padding:12px 28px;
border-radius:30px;
text-decoration:none;
background:#00b4ff;
color:white;
transition:0.3s;
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.btn:hover{
transform:scale(1.08);
background:#008cff;
}

/* popup */

.popup{
position:fixed;
bottom:25px;
right:25px;
background:white;
color:black;
padding:16px 18px;
border-radius:12px;
width:260px;
box-shadow:0 15px 30px rgba(0,0,0,0.4);
display:flex;
gap:10px;
align-items:flex-start;
animation:popupIn 0.5s;
}

.popup.hide{
animation:popupOut 0.5s forwards;
}

@keyframes popupIn{
from{
transform:translateX(120%);
opacity:0;
}
to{
transform:translateX(0);
opacity:1;
}
}

@keyframes popupOut{
from{
transform:translateX(0);
opacity:1;
}
to{
transform:translateX(120%);
opacity:0;
}
}

.icon{
font-size:22px;
}

/* footer */

footer{
position:fixed;
bottom:0;
width:100%;
display:flex;
justify-content:center;
gap:20px;
padding:12px;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(8px);
}

.social{
padding:10px 18px;
border-radius:30px;
text-decoration:none;
color:white;
font-size:14px;
transition:0.3s;
box-shadow:0 0 10px rgba(0,0,0,0.5);
animation:pulse 3s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.08)}
100%{transform:scale(1)}
}

.zalo{
background:#0084ff;
}

.face{
background:#1877f2;
}

.group{
background:#00c853;
}

.social:hover{
transform:scale(1.15);
}

</style>
</head>

<body>

<div class="container">

<img src="images/logo-1.png" class="logo">

<h1>THTSCSHOP</h1>

<p class="desc">Shop bán acc tự động</p>

<a class="btn" href="login.html">Đăng nhập</a>
<a class="btn" href="register.html">Tạo tài khoản</a>

</div>

<div class="popup" id="popup">

<div class="icon">🔔</div>

<div>
<b>Thông báo</b>
<p>Đăng nhập để vào shop</p>
</div>

</div>

<footer>

<a class="social zalo" href="https://zalo.me/YOUR_ZALO_LINK" target="_blank">
Zalo
</a>

<a class="social face" href="https://facebook.com/YOUR_FACE_LINK" target="_blank">
Facebook
</a>

<a class="social group" href="https://zalo.me/g/YOUR_GROUP_LINK" target="_blank">
Group Zalo
</a>

</footer>

<script>

let user = localStorage.getItem("login")

if(user){
location.href="shop.html"
}

/* popup auto hide */

setTimeout(()=>{
let p = document.getElementById("popup")
p.classList.add("hide")
},5000)

</script>

</body>
</html>
