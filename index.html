<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>THTSCSHOP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(270deg,#0f2027,#203a43,#2c5364);
background-size:600% 600%;
animation:bgmove 15s infinite;
color:white;
text-align:center;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

.main{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
backdrop-filter:blur(10px);
width:340px;
animation:fadein 1.2s;
}

@keyframes fadein{
from{opacity:0; transform:translateY(40px)}
to{opacity:1; transform:translateY(0)}
}

.logo{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
margin-bottom:20px;
box-shadow:0 0 20px rgba(255,255,255,0.5);
animation:float 3s ease-in-out infinite;
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-10px)}
100%{transform:translateY(0)}
}

h1{
margin-bottom:15px;
}

p{
opacity:0.8;
margin-bottom:25px;
}

.btn{
display:block;
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:30px;
background:#00b4ff;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
text-decoration:none;
}

.btn:hover{
transform:scale(1.05);
background:#008cff;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:flex;
align-items:center;
justify-content:center;
visibility:hidden;
opacity:0;
transition:0.4s;
}

.popup.show{
visibility:visible;
opacity:1;
}

.popup-box{
background:white;
color:black;
padding:30px;
border-radius:15px;
width:300px;
text-align:center;
animation:pop 0.4s;
}

@keyframes pop{
from{transform:scale(0.6);opacity:0}
to{transform:scale(1);opacity:1}
}

.close{
margin-top:15px;
padding:8px 20px;
background:#007bff;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="main">

<img src="logo.png" class="logo">

<h1>THTSCSHOP</h1>

<p>Shop bán acc tự động</p>

<a class="btn" href="login.html">Đăng nhập</a>
<a class="btn" href="register.html">Tạo tài khoản</a>

</div>

<div class="popup" id="popup">
<div class="popup-box">

<h3>Thông báo</h3>

<p>Chào mừng đến với THTSCSHOP</p>
<p>Hệ thống mua acc tự động</p>

<button class="close" onclick="closePopup()">Đóng</button>

</div>
</div>

<script>

let user = localStorage.getItem("login")

if(user){
location.href="shop.html"
}

window.onload=function(){
setTimeout(()=>{
document.getElementById("popup").classList.add("show")
},1000)
}

function closePopup(){
document.getElementById("popup").classList.remove("show")
}

</script>

</body>
</html>
