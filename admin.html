<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,Arial;
}

body{
background:#0f172a;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
height:60px;
display:flex;
align-items:center;
padding-left:20px;
background:#020617;
font-size:20px;
font-weight:600;
border-bottom:1px solid #1e293b;
}

/* LAYOUT */

.container{
flex:1;
display:flex;
overflow:hidden;
}

/* SIDEBAR */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
overflow-y:auto;
}

.sidebar h2{
padding:15px;
font-size:16px;
border-bottom:1px solid #1e293b;
}

.user{
padding:14px;
border-bottom:1px solid #1e293b;
cursor:pointer;
transition:0.2s;
}

.user:hover{
background:#1e293b;
}

/* MAIN */

.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

/* CARD */

.card{
background:#020617;
padding:30px;
border-radius:10px;
width:100%;
max-width:420px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card h3{
margin-bottom:10px;
}

.balance{
font-size:18px;
margin-bottom:15px;
color:#38bdf8;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

/* BUTTON */

button{
width:100%;
padding:11px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:600;
cursor:pointer;
}

.add{
background:#22c55e;
}

.pass{
background:#f59e0b;
}

.delete{
background:#ef4444;
}

/* POPUP */

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#020617;
padding:12px 20px;
border-radius:8px;
border:1px solid #1e293b;
opacity:0;
transition:0.3s;
}

.popup.show{
opacity:1;
}

/* MOBILE */

@media(max-width:800px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
height:200px;
}

}

</style>
</head>


<body>

<div class="header">
ADMIN DASHBOARD
</div>


<div class="container">

<div class="sidebar">

<h2>Danh sách user</h2>

<div id="users"></div>

</div>


<div class="main">

<div class="card" id="infoBox">

<h3>Chọn user để quản lý</h3>

</div>

</div>

</div>


<div class="popup" id="popup"></div>


<script>

const SERVER="https://shop-server-66d5.onrender.com"



function showPopup(text){

const p=document.getElementById("popup")

p.innerText=text
p.classList.add("show")

setTimeout(()=>{
p.classList.remove("show")
},2500)

}



// LOAD USERS

async function loadUsers(){

let res=await fetch(SERVER+"/admin/users")
let data=await res.json()

let box=document.getElementById("users")

box.innerHTML=""

data.forEach(u=>{

let div=document.createElement("div")
div.className="user"
div.innerText=u.username

div.onclick=()=>loadUser(u.username)

box.appendChild(div)

})

}

loadUsers()



// LOAD USER

async function loadUser(username){

let res=await fetch(SERVER+"/admin/user/"+username)
let u=await res.json()

document.getElementById("infoBox").innerHTML=`

<h3>${u.username}</h3>

<div class="balance">Số dư: ${u.balance}</div>

<input id="money" placeholder="Số tiền cộng">

<button class="add" onclick="addMoney('${u.username}')">
Cộng tiền
</button>

<input id="pass" placeholder="Mật khẩu mới">

<button class="pass" onclick="changePass('${u.username}')">
Đổi mật khẩu
</button>

<button class="delete" onclick="deleteUser('${u.username}')">
Xoá tài khoản
</button>

`

}



// ADD MONEY

async function addMoney(username){

let amount=document.getElementById("money").value

await fetch(SERVER+"/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

showPopup("Đã cộng tiền")

loadUser(username)

}



// CHANGE PASS

async function changePass(username){

let password=document.getElementById("pass").value

await fetch(SERVER+"/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

showPopup("Đã đổi mật khẩu")

}



// DELETE USER

async function deleteUser(username){

if(!confirm("Xác nhận xoá tài khoản?")) return

await fetch(SERVER+"/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

showPopup("Đã xoá user")

loadUsers()

document.getElementById("infoBox").innerHTML="<h3>User đã bị xoá</h3>"

}

</script>

</body>
</html>
