<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Control</title>

<style>

*{
box-sizing:border-box;
font-family:Arial;
}

body{
margin:0;
background:linear-gradient(135deg,#0f172a,#020617);
color:white;
overflow:hidden;
}

/* LOGIN */

.loginBox{
width:340px;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:30px;
border-radius:12px;
box-shadow:0 0 30px rgba(0,0,0,0.6);
animation:fadeIn 0.6s;
}

.loginBox h2{
text-align:center;
margin-bottom:20px;
}

.inputBox{
position:relative;
}

.inputBox input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-top:10px;
background:#1f2937;
color:white;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
opacity:0.8;
font-size:18px;
transition:transform 0.2s, opacity 0.2s;
}

.eye:hover{
transform:translateY(-50%) scale(1.2);
opacity:1;
}

.eye.open{
animation:eyeOpen 0.2s;
}

.eye.close{
animation:eyeClose 0.2s;
}

@keyframes eyeOpen{
from{transform:translateY(-50%) scale(0.7);}
to{transform:translateY(-50%) scale(1);}
}

@keyframes eyeClose{
from{transform:translateY(-50%) scale(1.2);}
to{transform:translateY(-50%) scale(1);}
}

button{
margin-top:15px;
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:#2563eb;
}

/* PANEL */

.panel{
display:none;
height:100vh;
animation:fadeIn 0.5s;
}

.sidebar{
width:260px;
background:#020617;
height:100%;
float:left;
overflow:auto;
border-right:1px solid #111;
}

.sidebar h3{
padding:15px;
margin:0;
border-bottom:1px solid #111;
}

.user{
padding:12px;
border-bottom:1px solid #111;
cursor:pointer;
transition:0.2s;
}

.user:hover{
background:#111827;
}

.detail{
margin-left:260px;
padding:25px;
height:100%;
overflow:auto;
}

.card{
background:#111827;
padding:20px;
border-radius:10px;
margin-bottom:15px;
animation:fadeIn 0.3s;
}

.card input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
}

.card button{
width:auto;
padding:10px 15px;
margin-right:8px;
}

/* POPUP */

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-30px);
background:#ef4444;
padding:12px 20px;
border-radius:8px;
font-weight:bold;
opacity:0;
transition:0.4s;
z-index:999;
}

.popup.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

/* ANIMATION */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="popup" id="popup"></div>

<!-- LOGIN -->

<div class="loginBox" id="loginBox">

<h2>Admin Login</h2>

<div class="inputBox">
<input type="password" id="adminPass" placeholder="Nhập mật khẩu admin">
<span class="eye close" id="eye" onclick="togglePass()">🙈</span>
</div>

<button onclick="login()">Đăng nhập</button>

</div>


<!-- PANEL -->

<div class="panel" id="panel">

<div class="sidebar">
<h3>Danh sách user</h3>
<div id="userList"></div>
</div>

<div class="detail" id="detail">
<h2>Chọn user để xem thông tin</h2>
</div>

</div>


<script>

const API="https://thtscshop-server.onrender.com"

/* POPUP */

function popup(text){

const p=document.getElementById("popup")

p.innerText=text
p.classList.add("show")

setTimeout(()=>{
p.classList.remove("show")
},3000)

}

/* TOGGLE PASSWORD */

function togglePass(){

const i=document.getElementById("adminPass")
const eye=document.getElementById("eye")

if(i.type==="password"){

i.type="text"
eye.innerText="👁"
eye.classList.remove("close")
eye.classList.add("open")

}else{

i.type="password"
eye.innerText="🙈"
eye.classList.remove("open")
eye.classList.add("close")

}

}

/* LOGIN */

async function login(){

const pass=document.getElementById("adminPass").value

try{

const res=await fetch(API+"/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass})
})

const data=await res.json()

if(!data.success){
popup("Sai mật khẩu admin")
return
}

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

loadUsers()

}catch{

popup("Không kết nối được server")

}

}

/* LOAD USERS */

async function loadUsers(){

const res=await fetch(API+"/admin/users")
const users=await res.json()

const list=document.getElementById("userList")

list.innerHTML=""

users.forEach(u=>{

const div=document.createElement("div")

div.className="user"
div.innerText=u.username

div.onclick=()=>{
showUser(u.username)
}

list.appendChild(div)

})

}

/* SHOW USER */

async function showUser(username){

const res=await fetch(API+"/admin/user/"+username)
const u=await res.json()

const box=document.getElementById("detail")

box.innerHTML=`

<div class="card">
<h2>${u.username}</h2>
<p>Số dư: ${u.balance}</p>
<p>Mật khẩu: ${u.password}</p>
<p>Ngày tạo: ${u.created_at}</p>
</div>

<div class="card">
<h3>Thêm tiền</h3>
<input id="money" placeholder="Số tiền">
<button onclick="addMoney('${u.username}')">Thêm</button>
</div>

<div class="card">
<h3>Đổi mật khẩu</h3>
<input id="newpass" placeholder="Mật khẩu mới">
<button onclick="changePass('${u.username}')">Đổi</button>
</div>

<div class="card">
<h3>Xóa tài khoản</h3>
<button onclick="deleteUser('${u.username}')">Xóa user</button>
</div>

<div class="card">
<h3>Lịch sử mua hàng</h3>
<pre>${JSON.stringify(u.history,null,2)}</pre>
</div>

`

}

/* ADD MONEY */

async function addMoney(username){

const amount=document.getElementById("money").value

await fetch(API+"/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

popup("Đã thêm tiền")

showUser(username)

}

/* CHANGE PASS */

async function changePass(username){

const password=document.getElementById("newpass").value

await fetch(API+"/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

popup("Đã đổi mật khẩu")

showUser(username)

}

/* DELETE USER */

async function deleteUser(username){

await fetch(API+"/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

popup("Đã xóa tài khoản")

loadUsers()

document.getElementById("detail").innerHTML=""

}

</script>

</body>
</html>
