<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#020024,#001933,#000814);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

/* HEADER */

.header{
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,255,255,0.1);
}

/* LAYOUT */

.container{
flex:1;
display:flex;
height:100%;
}

/* USER LIST */

.user-list{
width:35%;
background:rgba(0,0,0,0.35);
border-right:1px solid rgba(255,255,255,0.1);
overflow-y:auto;
}

.user-list h2{
padding:15px;
font-size:18px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.user{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition:0.25s;
}

.user:hover{
background:rgba(0,170,255,0.15);
padding-left:20px;
}

/* INFO */

.info{
flex:1;
padding:25px;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.info-box{
background:rgba(0,0,0,0.35);
padding:25px;
border-radius:10px;
width:90%;
max-width:420px;
box-shadow:0 0 25px rgba(0,0,0,0.4);
}

.info-box h3{
margin-bottom:15px;
font-size:22px;
}

.data{
margin:10px 0;
font-size:16px;
}

/* INPUT */

input{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
outline:none;
}

/* BUTTON */

button{
margin-top:12px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.add{
background:#00aaff;
color:white;
}

.add:hover{
background:#0088cc;
}

.delete{
background:#ff3b3b;
color:white;
}

.delete:hover{
background:#cc2a2a;
}

/* MOBILE */

@media(max-width:800px){

.container{
flex-direction:column;
}

.user-list{
width:100%;
height:200px;
}

}

</style>
</head>


<body>

<div class="header">
ADMIN CONTROL PANEL
</div>


<div class="container">


<div class="user-list">

<h2>Danh sách user</h2>

<div id="users"></div>

</div>


<div class="info">

<div class="info-box" id="infoBox">

<h3>Chọn user để xem</h3>

</div>

</div>

</div>



<script>

const SERVER="https://shop-server-66d5.onrender.com"


// LOAD USERS

async function loadUsers(){

let res=await fetch(SERVER+"/admin/users")
let data=await res.json()

let box=document.getElementById("users")

box.innerHTML=""

data.forEach(u=>{

let div=document.createElement("div")
div.className="user"
div.innerText=u.username

div.onclick=()=>loadUser(u.username)

box.appendChild(div)

})

}

loadUsers()



// LOAD USER INFO

async function loadUser(username){

let res=await fetch(SERVER+"/admin/user/"+username)
let u=await res.json()

document.getElementById("infoBox").innerHTML=`

<h3>${u.username}</h3>

<div class="data">Số dư: ${u.balance}</div>

<input id="money" placeholder="Số tiền cần cộng">

<button class="add" onclick="addMoney('${u.username}')">
Cộng tiền
</button>

<input id="pass" placeholder="Mật khẩu mới">

<button class="add" onclick="changePass('${u.username}')">
Đổi mật khẩu
</button>

<button class="delete" onclick="deleteUser('${u.username}')">
Xoá user
</button>

`

}



// ADD MONEY

async function addMoney(username){

let amount=document.getElementById("money").value

await fetch(SERVER+"/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

loadUser(username)

}



// CHANGE PASS

async function changePass(username){

let password=document.getElementById("pass").value

await fetch(SERVER+"/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

alert("Đã đổi mật khẩu")

}



// DELETE USER

async function deleteUser(username){

await fetch(SERVER+"/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

loadUsers()

document.getElementById("infoBox").innerHTML="<h3>User đã xoá</h3>"

}

</script>


</body>
</html>
