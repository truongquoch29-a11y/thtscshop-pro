<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#020617,#000000);
color:white;
height:100vh;
display:flex;
flex-direction:column;
animation:bgmove 8s infinite alternate;
}

@keyframes bgmove{
0%{background-position:left}
100%{background-position:right}
}

.header{
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.6);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.login-box{
margin:auto;
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:12px;
width:90%;
max-width:360px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.6);
animation:fade 0.5s;
}

.login-box h2{
margin-bottom:15px;
}

.password-box{
position:relative;
}

.password-box input{
width:100%;
padding:11px 40px 11px 11px;
border:none;
border-radius:6px;
outline:none;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:18px;
transition:0.2s;
}

.eye:hover{
transform:translateY(-50%) scale(1.2);
}

.login-btn{
margin-top:15px;
width:100%;
padding:11px;
border:none;
border-radius:6px;
background:#00aaff;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.25s;
}

.login-btn:hover{
background:#0088cc;
transform:scale(1.05);
}

.container{
flex:1;
display:flex;
height:100%;
}

.user-list{
width:35%;
background:rgba(0,0,0,0.35);
border-right:1px solid rgba(255,255,255,0.1);
overflow-y:auto;
}

.user-list h2{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.user{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
transition:0.2s;
}

.user:hover{
background:rgba(0,170,255,0.15);
padding-left:20px;
}

.info{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
}

.info-box{
background:rgba(0,0,0,0.4);
padding:25px;
border-radius:10px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 25px rgba(0,0,0,0.5);
animation:fade 0.5s;
}

.data{
margin:10px 0;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
outline:none;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

.add{
background:#00aaff;
color:white;
}

.add:hover{
background:#0088cc;
transform:scale(1.05);
}

.delete{
background:#ff3b3b;
color:white;
}

.delete:hover{
background:#cc2a2a;
transform:scale(1.05);
}

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%) translateY(-20px);
background:#020617;
padding:12px 20px;
border-radius:8px;
opacity:0;
transition:0.35s;
border:1px solid #1e293b;
}

.popup.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.success{
border-color:#22c55e;
}

.error{
border-color:#ef4444;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px)}
to{opacity:1;transform:translateY(0)}
}

@media(max-width:800px){

.container{
flex-direction:column;
}

.user-list{
width:100%;
height:200px;
}

}

</style>
</head>

<body>

<div class="header">
ADMIN CONTROL PANEL
</div>

<div id="loginBox" class="login-box">

<h2>Admin Login</h2>

<div class="password-box">
<input id="adminPass" type="password" placeholder="Nhập mật khẩu admin">
<span class="eye" onclick="togglePass()" id="eye">👁️</span>
</div>

<button class="login-btn" onclick="login()">Đăng nhập</button>

</div>

<div class="container" id="panel" style="display:none">

<div class="user-list">
<h2>Danh sách user</h2>
<div id="users"></div>
</div>

<div class="info">
<div class="info-box" id="infoBox">
<h3>Chọn user để xem</h3>
</div>
</div>

</div>

<div class="popup" id="popup"></div>

<script>

const SERVER="https://shop-server-66d5.onrender.com"

function popup(text,type){

const p=document.getElementById("popup")

p.innerText=text
p.className="popup show "+type

setTimeout(()=>{
p.className="popup"
},2500)

}

function togglePass(){

const input=document.getElementById("adminPass")
const eye=document.getElementById("eye")

if(input.type==="password"){
input.type="text"
eye.innerText="🙈"
}else{
input.type="password"
eye.innerText="👁️"
}

}

async function login(){

const pass=document.getElementById("adminPass").value

try{

const res=await fetch(SERVER+"/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass})
})

const data=await res.json()

if(!data.success){
popup("Sai mật khẩu","error")
return
}

popup("Đăng nhập thành công","success")

setTimeout(()=>{
document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="flex"
loadUsers()
},800)

}catch{

popup("Không kết nối được server","error")

}

}

async function loadUsers(){

let res=await fetch(SERVER+"/admin/users")
let data=await res.json()

let box=document.getElementById("users")
box.innerHTML=""

data.forEach(u=>{

let div=document.createElement("div")
div.className="user"
div.innerText=u.username

div.onclick=()=>loadUser(u.username)

box.appendChild(div)

})

}

async function loadUser(username){

let res=await fetch(SERVER+"/admin/user/"+username)
let u=await res.json()

document.getElementById("infoBox").innerHTML=`

<h3>${u.username}</h3>

<div class="data">Số dư: ${u.balance}</div>

<div id="moneyBox">
<input id="money" placeholder="Số tiền cần cộng">
<button class="add" onclick="addMoney('${u.username}')">
Cộng tiền
</button>
</div>

<div id="passBox">
<input id="pass" placeholder="Mật khẩu mới">
<button class="add" onclick="changePass('${u.username}')">
Đổi mật khẩu
</button>
</div>

<button class="delete" onclick="deleteUser('${u.username}')">
Xoá user
</button>

`

}

async function addMoney(username){

let amount=document.getElementById("money").value

await fetch(SERVER+"/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

popup("Đã cộng tiền","success")

document.getElementById("moneyBox").style.display="none"

loadUser(username)

}

async function changePass(username){

let password=document.getElementById("pass").value

await fetch(SERVER+"/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

popup("Đã đổi mật khẩu","success")

document.getElementById("passBox").style.display="none"

}

async function deleteUser(username){

await fetch(SERVER+"/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

loadUsers()

document.getElementById("infoBox").innerHTML="<h3>User đã xoá</h3>"

}

</script>

</body>
</html>
