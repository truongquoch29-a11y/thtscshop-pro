<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#020617,#000000);
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
padding:16px;
font-size:22px;
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.6);
border-bottom:1px solid rgba(255,255,255,0.1);
}

.login-box{
margin:auto;
background:rgba(0,0,0,0.5);
padding:30px;
border-radius:12px;
width:90%;
max-width:360px;
text-align:center;
}

.password-box{
position:relative;
}

.password-box input{
width:100%;
padding:11px 40px 11px 11px;
border:none;
border-radius:6px;
}

.eye{
position:absolute;
right:12px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.login-btn{
margin-top:15px;
width:100%;
padding:11px;
border:none;
border-radius:6px;
background:#00aaff;
color:white;
font-weight:bold;
cursor:pointer;
}

.container{
flex:1;
display:flex;
height:100%;
}

.user-list{
width:35%;
background:rgba(0,0,0,0.35);
border-right:1px solid rgba(255,255,255,0.1);
overflow-y:auto;
}

.user-list h2{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.user{
padding:14px;
border-bottom:1px solid rgba(255,255,255,0.05);
cursor:pointer;
}

.user:hover{
background:rgba(0,170,255,0.15);
}

.info{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:25px;
}

.info-box{
background:rgba(0,0,0,0.4);
padding:25px;
border-radius:10px;
width:90%;
max-width:420px;
text-align:center;
}

.data{
margin:10px 0;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
}

button{
margin-top:10px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#00aaff;
color:white;
}

.delete{
background:#ff3b3b;
color:white;
}

.kick{
background:#f59e0b;
color:white;
}

.history{
margin-top:15px;
background:#020617;
padding:10px;
border-radius:6px;
max-height:120px;
overflow:auto;
font-size:14px;
text-align:left;
}

.popup{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:#020617;
padding:12px 20px;
border-radius:8px;
opacity:0;
transition:0.35s;
border:1px solid #1e293b;
}

.popup.show{
opacity:1;
}

.success{
border-color:#22c55e;
}

.error{
border-color:#ef4444;
}

</style>
</head>

<body>

<div class="header">
ADMIN CONTROL PANEL
</div>

<div id="loginBox" class="login-box">

<h2>Admin Login</h2>

<div class="password-box">
<input id="adminPass" type="password" placeholder="Nhập mật khẩu admin">
<span class="eye" onclick="togglePass()" id="eye">👁️</span>
</div>

<button class="login-btn" onclick="login()">Đăng nhập</button>

</div>

<div class="container" id="panel" style="display:none">

<div class="user-list">
<h2>Danh sách user</h2>
<div id="users"></div>
</div>

<div class="info">
<div class="info-box" id="infoBox">
<h3>Chọn user để xem</h3>
</div>
</div>

</div>

<div class="popup" id="popup"></div>

<script>

const SERVER="https://shop-server-66d5.onrender.com"


let currentUser=null

setInterval(()=>{
if(currentUser){
loadUser(currentUser)
}
},5000)
function money(n){
return Number(n).toLocaleString("vi-VN")
}

function popup(text,type){

const p=document.getElementById("popup")

p.innerText=text
p.className="popup show "+type

setTimeout(()=>{
p.className="popup"
},2500)

}

function togglePass(){

const input=document.getElementById("adminPass")
const eye=document.getElementById("eye")

if(input.type==="password"){
input.type="text"
eye.innerText="🙈"
}else{
input.type="password"
eye.innerText="👁️"
}

}

async function login(){

const pass=document.getElementById("adminPass").value

try{

const res=await fetch(SERVER+"/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass})
})

const data=await res.json()

if(!data.success){
popup("Sai mật khẩu","error")
return
}
localStorage.setItem("adminPass",pass)
popup("Đăng nhập thành công","success")

setTimeout(()=>{
document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="flex"
loadUsers()
},800)

}catch{

popup("Không kết nối được server","error")

}

}
async function loadUsers(){

let res=await fetch(SERVER+"/admin/users")
let data=await res.json()

let box=document.getElementById("users")
box.innerHTML=""

data.forEach(u=>{

let div=document.createElement("div")
div.className="user"
div.innerText=u.username

div.onclick=()=>loadUser(u.username)

box.appendChild(div)

})

}

async function loadUser(username){

currentUser=username

let res=await fetch(SERVER+"/admin/user/"+username)
let u=await res.json()

let napHistory="Đang tải..."

try{

let res2=await fetch(SERVER+"/deposit/"+username)
let deposits=await res2.json()

napHistory = deposits.map(d=>{

let btn=""

if(!d.status || d.status==="pending"){
btn=`
<button class="add" onclick="confirmNap('${d.id}','${u.username}')">
Xác nhận
</button>

<button class="delete" onclick="deleteNap('${d.id}','${u.username}')">
Xoá
</button>
`
}

return `
<div>
+ ${money(d.amount)} đ | ${d.created_at}
${btn}
</div>
`

}).join("") || "Không có"

}catch{

napHistory="Không tải được"

}

let buyHistory=(u.buy_history||[]).map(i=>{
return `<div>- ${i.item} | ${money(i.price)} đ</div>`
}).join("") || "Không có"

document.getElementById("infoBox").innerHTML=`

<h3>${u.username}</h3>

<div class="data">Số dư: ${money(u.balance)} đ</div>

<div class="data">Ngày tạo: ${u.created_at||"Không rõ"}</div>

<input id="money" placeholder="Số tiền cần cộng">
<button class="add" onclick="addMoney('${u.username}')">Cộng tiền</button>

<input id="pass" placeholder="Mật khẩu mới">
<button class="add" onclick="changePass('${u.username}')">Đổi mật khẩu</button>

<button class="kick" onclick="kickUser('${u.username}')">Kick user</button>

<button class="delete" onclick="deleteUser('${u.username}')">Xoá user</button>

<h4>Lịch sử nạp</h4>
<div class="history">${napHistory}</div>

<h4>Lịch sử mua acc</h4>
<div class="history">${buyHistory}</div>

`

}

async function addMoney(username){

let amount=document.getElementById("money").value

await fetch(SERVER+"/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

popup("Đã cộng tiền","success")
loadUser(username)

}

async function changePass(username){

let password=document.getElementById("pass").value

if(password.length < 6){
popup("Mật khẩu phải từ 6 ký tự","error")
return
}

await fetch(SERVER+"/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

popup("Đã đổi mật khẩu","success")

}

async function kickUser(username){

await fetch(SERVER+"/admin/kick-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

popup("Đã kick user","success")

}

async function deleteUser(username){

await fetch(SERVER+"/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

loadUsers()

document.getElementById("infoBox").innerHTML="<h3>User đã xoá</h3>"

}
window.onload=()=>{

let saved=localStorage.getItem("adminPass")

if(saved){
document.getElementById("adminPass").value=saved
login()
}

}
  async function confirmNap(id,username){

await fetch(SERVER+"/deposit/confirm",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({id})
})

popup("Đã cộng tiền","success")
loadUser(username)

  }

async function deleteNap(content,username){

await fetch(SERVER+"/delete-deposit",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({content})
})

popup("Đã xoá giao dịch","success")
loadUser(username)

}
</script>

</body>
</html>
