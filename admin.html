<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
}

.login{
width:300px;
margin:120px auto;
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:none;
}

button{
padding:10px 15px;
margin-top:10px;
cursor:pointer;
border:none;
border-radius:6px;
}

.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
}

.panel{
display:none;
padding:20px;
}

.userlist{
width:250px;
float:left;
background:#111827;
height:90vh;
overflow:auto;
}

.userlist div{
padding:10px;
border-bottom:1px solid #333;
cursor:pointer;
}

.userlist div:hover{
background:#1f2937;
}

.detail{
margin-left:270px;
padding:20px;
}
</style>

</head>

<body>

<div class="login" id="loginBox">

<h2>Admin Login</h2>

<div style="position:relative">

<input type="password" id="adminPass" placeholder="Admin password">

<span class="eye" onclick="togglePass()">👁</span>

</div>

<button onclick="login()">Login</button>

</div>



<div class="panel" id="panel">

<div class="userlist" id="userlist"></div>

<div class="detail" id="detail">
<h2>Chọn user</h2>
</div>

</div>



<script>

const ADMIN_PASSWORD="123456"



function togglePass(){

const input=document.getElementById("adminPass")

if(input.type==="password"){
input.type="text"
}else{
input.type="password"
}

}



function login(){

const pass=document.getElementById("adminPass").value

if(pass!==ADMIN_PASSWORD){
alert("Sai mật khẩu admin")
return
}

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

loadUsers()

}



async function loadUsers(){

const res=await fetch("/admin/users")
const data=await res.json()

const list=document.getElementById("userlist")

list.innerHTML=""

data.forEach(u=>{

const div=document.createElement("div")

div.innerText=u.username

div.onclick=()=>showUser(u.username)

list.appendChild(div)

})

}



async function showUser(username){

const res=await fetch("/admin/user/"+username)
const u=await res.json()

const box=document.getElementById("detail")

box.innerHTML=`

<h2>${u.username}</h2>

<p>Số dư: ${u.balance}</p>

<p>Mật khẩu: ${u.password}</p>

<p>Ngày tạo: ${u.created_at}</p>

<h3>Lịch sử mua hàng</h3>
<pre>${JSON.stringify(u.history,null,2)}</pre>

<input id="money" placeholder="Thêm tiền">
<button onclick="addMoney('${u.username}')">Thêm tiền</button>

<input id="newpass" placeholder="Đổi mật khẩu">
<button onclick="changePass('${u.username}')">Đổi mật khẩu</button>

<button onclick="deleteUser('${u.username}')">Xóa tài khoản</button>

`

}



async function addMoney(username){

const amount=document.getElementById("money").value

await fetch("/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

showUser(username)

}



async function changePass(username){

const password=document.getElementById("newpass").value

await fetch("/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

showUser(username)

}



async function deleteUser(username){

await fetch("/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

loadUsers()
document.getElementById("detail").innerHTML=""

}

</script>

</body>
</html>
