<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Control</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#0f172a;
color:white;
height:100vh;
}

/* LOGIN */

.loginBox{
width:340px;
max-width:90%;
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#020617;
padding:30px;
border-radius:10px;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

.loginBox h2{
text-align:center;
margin-bottom:20px;
}

.inputBox{
position:relative;
}

.inputBox input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

.eye{
position:absolute;
right:10px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
}

.loginBox button{
width:100%;
padding:12px;
margin-top:15px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
font-weight:bold;
cursor:pointer;
}

/* PANEL */

.panel{
display:none;
height:100vh;
}

/* HEADER */

.header{
height:55px;
display:flex;
align-items:center;
padding-left:20px;
background:#020617;
border-bottom:1px solid #1e293b;
font-size:18px;
font-weight:bold;
}

/* LAYOUT */

.container{
display:flex;
height:calc(100vh - 55px);
}

/* USER LIST */

.sidebar{
width:260px;
background:#020617;
border-right:1px solid #1e293b;
overflow:auto;
}

.sidebar h3{
padding:15px;
border-bottom:1px solid #1e293b;
}

.user{
padding:14px;
border-bottom:1px solid #1e293b;
cursor:pointer;
transition:0.2s;
}

.user:hover{
background:#1e293b;
}

/* DETAIL */

.detail{
flex:1;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:#020617;
padding:25px;
border-radius:10px;
width:100%;
max-width:420px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.card h2{
margin-bottom:10px;
}

.balance{
margin-bottom:15px;
color:#38bdf8;
}

.card input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
background:#1e293b;
color:white;
}

.card button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.add{
background:#22c55e;
}

.pass{
background:#f59e0b;
}

.delete{
background:#ef4444;
}

/* MOBILE */

@media(max-width:800px){

.container{
flex-direction:column;
}

.sidebar{
width:100%;
height:200px;
}

}

</style>
</head>

<body>

<div class="loginBox" id="loginBox">

<h2>Admin Login</h2>

<div class="inputBox">
<input type="password" id="adminPass" placeholder="Nhập mật khẩu admin">
<span class="eye" onclick="togglePass()">👁</span>
</div>

<button onclick="login()">Đăng nhập</button>

</div>



<div class="panel" id="panel">

<div class="header">
ADMIN DASHBOARD
</div>

<div class="container">

<div class="sidebar">

<h3>Danh sách user</h3>

<div id="userList"></div>

</div>


<div class="detail" id="detail">

<h2>Chọn user để xem thông tin</h2>

</div>

</div>

</div>


<script>

const API="https://shop-server-66d5.onrender.com"



function togglePass(){

const i=document.getElementById("adminPass")

if(i.type==="password"){
i.type="text"
}else{
i.type="password"
}

}



// LOGIN

async function login(){

const pass=document.getElementById("adminPass").value

const res=await fetch(API+"/admin/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({password:pass})
})

const data=await res.json()

if(!data.success){
alert("Sai mật khẩu admin")
return
}

document.getElementById("loginBox").style.display="none"
document.getElementById("panel").style.display="block"

loadUsers()

}



// LOAD USERS

async function loadUsers(){

const res=await fetch(API+"/admin/users")
const users=await res.json()

const list=document.getElementById("userList")

list.innerHTML=""

users.forEach(u=>{

const div=document.createElement("div")
div.className="user"
div.innerText=u.username

div.onclick=()=>showUser(u.username)

list.appendChild(div)

})

}



// SHOW USER

async function showUser(username){

const res=await fetch(API+"/admin/user/"+username)
const u=await res.json()

const box=document.getElementById("detail")

box.innerHTML=`

<div class="card">

<h2>${u.username}</h2>

<div class="balance">Số dư: ${u.balance}</div>

<input id="money" placeholder="Số tiền">

<button class="add" onclick="addMoney('${u.username}')">
Cộng tiền
</button>

<input id="newpass" placeholder="Mật khẩu mới">

<button class="pass" onclick="changePass('${u.username}')">
Đổi mật khẩu
</button>

<button class="delete" onclick="deleteUser('${u.username}')">
Xoá user
</button>

</div>

`

}



// ADD MONEY

async function addMoney(username){

const amount=document.getElementById("money").value

await fetch(API+"/admin/add-money",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,amount})
})

showUser(username)

}



// CHANGE PASS

async function changePass(username){

const password=document.getElementById("newpass").value

await fetch(API+"/admin/change-pass",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username,password})
})

alert("Đã đổi mật khẩu")

}



// DELETE USER

async function deleteUser(username){

if(!confirm("Xác nhận xoá user?")) return

await fetch(API+"/admin/delete-user",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({username})
})

loadUsers()

document.getElementById("detail").innerHTML="<h2>User đã bị xoá</h2>"

}

</script>

</body>
</html>
