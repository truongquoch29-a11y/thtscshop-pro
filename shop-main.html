<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THTSC Shop</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#0f172a;
color:white;
font-family:Arial;
min-height:100vh;
padding-bottom:120px;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#020617;
border-bottom:1px solid rgba(255,255,255,0.1);
}

.logo{
display:flex;
align-items:center;
gap:10px;
font-size:18px;
font-weight:bold;
}

.logo img{
width:38px;
height:38px;
border-radius:50%;
object-fit:cover;
}

.balance{
background:#1e293b;
padding:8px 14px;
border-radius:20px;
font-size:13px;
}

/* GRID */

.container{
padding:20px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

/* CARD */

.card{
background:#1e293b;
border-radius:14px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.card:hover{
transform:translateY(-6px) scale(1.03);
}

.card img{
width:100%;
height:140px;
object-fit:cover;
}

.card-body{
padding:14px;
}

.card-body h3{
margin-bottom:6px;
}

.card-body p{
font-size:13px;
opacity:0.85;
}

/* ACTION */

.actions{
padding:0 20px 20px 20px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
padding:10px 18px;
border:none;
border-radius:20px;
cursor:pointer;
background:#00b4ff;
color:white;
}

.logout{
background:#ef4444;
}

/* POPUP */

.popup{
position:fixed;
left:50%;
bottom:100px;
transform:translateX(-50%) translateY(40px);
background:#111827;
padding:14px 18px;
border-radius:12px;
display:flex;
align-items:center;
gap:10px;
font-size:14px;
box-shadow:0 10px 25px rgba(0,0,0,0.35);
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:999;
}

.popup.show{
opacity:1;
transform:translateX(-50%) translateY(0);
}

.popup.success{
border-left:4px solid #22c55e;
}

.popup.error{
border-left:4px solid #ef4444;
}

/* FOOTER */

footer{
position:fixed;
bottom:15px;
text-align:center;
width:100%;
}

.thank{
font-size:13px;
margin-bottom:6px;
opacity:0.9;
}

.footer-buttons{
display:flex;
justify-content:center;
gap:10px;
}

.footer-btn{
background:rgba(255,255,255,0.15);
padding:7px 14px;
border-radius:10px;
color:white;
text-decoration:none;
font-size:12px;
border:1px solid rgba(255,255,255,0.25);
}

</style>

</head>

<body>

<header>

<div class="logo">
<img src="logo.png">
<span>THTSC SHOP</span>
</div>

<div class="balance">
💰 <span id="money">0</span>
</div>

</header>


<div class="container">

<div class="card" onclick="go('vip.html')">
<img src="https://picsum.photos/400/200">
<div class="card-body">
<h3>Acc VIP</h3>
<p>Tài khoản chất lượng cao, nhiều vật phẩm.</p>
</div>
</div>

<div class="card" onclick="go('thuong.html')">
<img src="https://picsum.photos/401/200">
<div class="card-body">
<h3>Acc Thường</h3>
<p>Tài khoản giá rẻ để chơi giải trí.</p>
</div>
</div>

<div class="card" onclick="go('clone.html')">
<img src="https://picsum.photos/402/200">
<div class="card-body">
<h3>Acc Clone</h3>
<p>Tài khoản clone giá rẻ.</p>
</div>
</div>

</div>


<div class="actions">

<button onclick="nap()">Nạp tiền</button>

<button class="logout" onclick="logout()">Đăng xuất</button>

</div>


<footer>

<p class="thank">Cảm ơn quý khách đã ghé thăm shop</p>

<div class="footer-buttons">

<a href="https://zalo.me/YOUR_ZALO" class="footer-btn">Zalo</a>

<a href="https://facebook.com/YOUR_FACE" class="footer-btn">Facebook</a>

<a href="https://zalo.me/g/YOUR_GROUP" class="footer-btn">Group Zalo</a>

</div>

</footer>


<div id="popup" class="popup">
<span id="popupIcon">⚠️</span>
<span id="popupText"></span>
</div>


<script>

const SERVER="https://shop-server-66d5.onrender.com"

let user=localStorage.getItem("login")

if(!user){
location.href="login.html"
}

function popup(text,type){

let p=document.getElementById("popup")
let icon=document.getElementById("popupIcon")
let txt=document.getElementById("popupText")

txt.innerText=text

p.classList.remove("success","error")

if(type==="success"){
icon.innerText="✅"
p.classList.add("success")
}else{
icon.innerText="⚠️"
p.classList.add("error")
}

p.classList.add("show")

setTimeout(()=>{
p.classList.remove("show")
},3500)

}

setTimeout(()=>{
popup("Xin chào "+user+" • Chào mừng tới shop","success")
},500)

function go(p){
location.href=p
}

function logout(){
localStorage.removeItem("login")
location.href="login.html"
}

function nap(){
location.href="nap.html"
}

async function load(){

try{

let res=await fetch(SERVER+"/user/"+user)

let data=await res.json()

if(data.status==="deleted"){
localStorage.removeItem("login")
popup("Tài khoản đã bị xoá","error")
setTimeout(()=>{
location.href="login.html"
},1200)
return
}

if(data.status==="pass_changed"){
localStorage.removeItem("login")
popup("Mật khẩu đã thay đổi, vui lòng đăng nhập lại","error")
setTimeout(()=>{
location.href="login.html"
},1200)
return
}

document.getElementById("money").innerText=data.balance

}catch{

popup("Không kết nối được server","error")

}

}

load()

setInterval(load,5000)

</script>

</body>
</html>
